<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coway | Better Life, Happy Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="nav">
        <div class="container">
            <span class="logo">COWAY</span>
        </div>
    </nav>

    <main class="container">
        <header class="header">
            <p class="subtitle">PREMIUM QUALITY</p>
            <h1>Pure water for your home.</h1>
        </header>

        <section class="grid">
            <div class="card">
                <div class="img-box">
                    <img src="https://www.coway.com.my/media/catalog/product/n/e/neo_plus_1.png" alt="Neo Plus">
                </div>
                <div class="content">
                    <h3>Neo Plus</h3>
                    <p class="spec">Water Purifier</p>
                    <p class="price">RM 65.00 <span>/ month</span></p>
                    <a href="https://wa.me/60123456789" class="btn">Enquire Now</a>
                </div>
            </div>

            <div class="card">
                <div class="img-box">
                    <img src="https://www.coway.com.my/media/catalog/product/s/t/storm_2_1.png" alt="Storm 2">
                </div>
                <div class="content">
                    <h3>Storm 2</h3>
                    <p class="spec">Air Purifier</p>
                    <p class="price">RM 70.00 <span>/ month</span></p>
                    <a href="https://wa.me/60123456789" class="btn">Enquire Now</a>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
