<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coway | Premium Home Wellness</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <a href="https://wa.me/+60196957815" class="floating-wa" target="_blank">
        <i data-lucide="message-circle"></i>
    </a>

    <div id="nav-placeholder"></div>

    <main class="container">
        <header class="hero">
            <span class="badge">No. 1 in Malaysia</span>
            <!-- <h1>The best care for <br>your family.</h1> -->
            <h1>Water &nbsp;&nbsp;Purifier</h1>
        </header>

        <section class="product-grid">

            <div class="card">
                <div class="icon-tag"><i data-lucide="droplets"></i> Water</div>
                <div class="img-container">
                    <img src="img/coway-glaze.png" alt="Glaze">
                </div>
                <div class="info">
                    <h3>Glaze</h3>
                    <p class="price">RM 75<span>/mo</span></p>
                    <ul class="specs">
                        <li><i data-lucide="check"></i> 3 Temperatures</li>
                        <li><i data-lucide="check"></i> 6.0 L Tank</li>
                        <li><i data-lucide="check"></i> 260 x 483 x 510 mm (W x D x H)</li>
                        <li><i data-lucide="check"></i> 17.3 kg</li>
                    </ul>
                    <div class="color-selection">
                        <p>Available Colors:</p>
                        <div class="swatches">
                            <span class="circle white active" title="White"></span>

                        </div>
                    </div>
                    <a href="https://wa.me/+60196957815" class="btn-primary">Order Now</a>
                </div>
            </div>



        </section>
    </main>

    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        // MOBILE MENU LOGIC
        const menuBtn = document.getElementById('mobile-menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const mobileOverlay = document.getElementById('mobile-overlay-menu');

        // Open Menu
        menuBtn.addEventListener('click', () => {
            mobileOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Stop background scrolling when menu is open
        });

        // Close Menu via the 'X' button
        closeBtn.addEventListener('click', () => {
            mobileOverlay.classList.remove('active');
            document.body.style.overflow = 'auto'; // Allow scrolling again
        });

        // COLOR SWATCH LOGIC
        const swatches = document.querySelectorAll('.circle');

        swatches.forEach(swatch => {
            swatch.addEventListener('click', function () {
                // 1. Remove 'active' class from all circles
                swatches.forEach(s => s.classList.remove('active'));

                // 2. Add 'active' class to the one you just clicked
                this.classList.add('active');
            });
        });
    </script>
</body>

</html>
